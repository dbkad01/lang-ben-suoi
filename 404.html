<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lang Ben Suoi</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(180deg,#f8fafc,#eef2f7);
    color:#0f172a;
}

.container{
    padding:16px;
    max-width:950px;
    margin:auto;
}

/* BANNER */
.banner{
    position:relative;
    height:260px;
    border-radius:22px;
    overflow:hidden;
    margin-bottom:24px;
    box-shadow:0 20px 50px rgba(0,0,0,0.1);
}

.banner img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.banner::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom,rgba(0,0,0,0.2),rgba(0,0,0,0.6));
}

.banner-text{
    position:absolute;
    bottom:20px;
    left:20px;
    color:#fff;
    font-size:28px;
    font-weight:700;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:18px;
    margin-bottom:16px;
    border:1px solid #e2e8f0;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
    transition:0.25s ease;
}

.card:hover{
    transform:translateY(-4px);
    box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

.card h2{
    font-size:18px;
    margin-bottom:8px;
}

.card p{
    font-size:14.5px;
    line-height:1.6;
    color:#475569;
}

/* BUTTONS */
.actions{
    display:flex;
    gap:10px;
    margin-top:12px;
    flex-wrap:wrap;
}

.btn{
    padding:10px 16px;
    border-radius:10px;
    text-decoration:none;
    font-size:14px;
    font-weight:500;
    transition:0.2s;
}

.btn-call{
    background:#22c55e;
    color:white;
}

.btn-map{
    background:#0ea5e9;
    color:white;
}

.btn:hover{
    transform:translateY(-2px);
    opacity:0.9;
}

/* GALLERY */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:12px;
}

.gallery img{
    width:100%;
    aspect-ratio:3/2;
    object-fit:cover;
    object-position:center;
    border-radius:12px;
    transition:0.25s;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* FOOTER */
footer{
    text-align:center;
    padding:24px;
    margin-top:30px;
    font-size:13px;
    color:#64748b;
}
</style>
</head>

<body>

<div class="container">

<div class="banner">
<img src="banner.PNG">
<div class="banner-text">🌿 Lang Ben Suoi</div>
</div>

<div class="card">
<h2>About This Place</h2>
<p>A peaceful camping retreat surrounded by mountains and nature. Perfect for relaxing, taking photos, and enjoying fresh air.</p>
<p>🏡 9 rooms • 🍽 dining • 🚗 parking • 🌳 wooden swing</p>
<p>📍 Xuan Truong, Da Lat</p>

<div class="actions">
<a href="tel:0969930775" class="btn btn-call">📞 Call us now</a>
<a href="https://maps.app.goo.gl/sS1jt5CVVS34DqYQ8?g_st=ic" class="btn btn-map">🗺️Map</a>
</div>
</div>

<div class="card">
<h2>Gallery</h2>
<div class="gallery">
<img src="anh1.PNG">
<img src="anh2.PNG">
<img src="anh3.PNG">
<img src="anh4.PNG">
<img src="anh5.PNG">
</div>
</div>

</div>

<footer>
Development by DevBlzAlphaK1dXD
</footer>

</body>
</html>
